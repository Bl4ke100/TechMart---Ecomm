<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechMart Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen">

<nav class="flex items-center justify-between p-5 bg-gray-800 shadow-md">
    <div class="text-2xl font-bold text-white tracking-wide flex items-center gap-3">
        TechMart Admin
        <span class="bg-rose-500 text-white text-xs px-2.5 py-1 rounded font-semibold uppercase tracking-wider">Root Access</span>
    </div>
    <div class="flex gap-6 items-center text-sm font-semibold">
        <span id="user-greeting" class="text-gray-400 font-normal">Welcome, Admin</span>
        <a href="admin_dashboard.html" class="bg-gray-700 px-4 py-2 rounded-lg text-white">Platform</a>
        <a href="admin_performance.html" class="hover:text-gray-300 transition">Performance</a>
        <a href="admin_products.html" class="hover:text-gray-300 transition">Products</a>
        <a href="admin_users.html" class="hover:text-gray-300 transition">Users</a>
        <button id="logout-btn" class="text-red-400 hover:text-red-300 transition">Logout</button>
    </div>
</nav>

<main class="max-w-7xl mx-auto p-6 mt-8 space-y-8">
    <header class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 border-b border-gray-700 pb-6">
        <div>
            <h2 class="text-3xl font-bold text-white mb-1">Platform Dashboard</h2>
            <p class="text-gray-400 text-sm">Real-time overview of TechMart performance</p>
        </div>
        <div class="flex gap-3">
            <button id="export-stats-btn" class="bg-indigo-600 hover:bg-indigo-500 text-white font-bold px-6 py-2.5 rounded-lg text-sm transition shadow-lg shadow-indigo-900/30 flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>
                Export Stats
            </button>
            <button id="export-csv-btn" class="bg-emerald-600 hover:bg-emerald-500 text-white font-bold px-6 py-2.5 rounded-lg text-sm transition shadow-lg shadow-emerald-900/30 flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>
                Export Orders
            </button>
        </div>
    </header>

    <div class="grid grid-cols-1 sm:grid-cols-3 gap-6">
        <!-- Metric Cards -->
        <div class="bg-gray-800 p-6 rounded-2xl shadow-lg border border-gray-700 flex items-center justify-between">
            <div>
                <h3 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Total Orders</h3>
                <h1 id="total-orders" class="text-4xl font-extrabold text-white tracking-tight animate-pulse">...</h1>
            </div>
            <div class="bg-blue-500/20 p-4 rounded-xl text-blue-400">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" /></svg>
            </div>
        </div>

        <div class="bg-gray-800 p-6 rounded-2xl shadow-lg border border-gray-700 flex items-center justify-between">
            <div>
                <h3 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Total Users</h3>
                <h1 id="total-users" class="text-4xl font-extrabold text-white tracking-tight animate-pulse">...</h1>
            </div>
            <div class="bg-purple-500/20 p-4 rounded-xl text-purple-400">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" /></svg>
            </div>
        </div>

        <div class="bg-gray-800 p-6 rounded-2xl shadow-lg border border-gray-700 flex items-center justify-between">
            <div>
                <h3 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Total Products</h3>
                <h1 id="total-products" class="text-4xl font-extrabold text-white tracking-tight animate-pulse">...</h1>
            </div>
            <div class="bg-amber-500/20 p-4 rounded-xl text-amber-400">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4" /></svg>
            </div>
        </div>
    </div>



    <!-- Recent Orders Table -->
    <div class="bg-gray-800 p-6 rounded-2xl shadow-lg border border-gray-700">
        <h3 class="text-lg font-bold mb-6 text-white flex items-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
            Recent Global Orders
        </h3>
        <div class="overflow-x-auto">
            <table class="w-full text-left text-sm whitespace-nowrap">
                <thead class="text-gray-400 border-b border-gray-700">
                    <tr>
                        <th class="py-3 px-4 font-semibold">Order ID</th>
                        <th class="py-3 px-4 font-semibold">User</th>
                        <th class="py-3 px-4 font-semibold">Product ID</th>
                        <th class="py-3 px-4 font-semibold">Qty</th>
                        <th class="py-3 px-4 font-semibold">Date</th>
                        <th class="py-3 px-4 font-semibold text-right">Status</th>
                    </tr>
                </thead>
                <tbody id="recent-orders-list" class="divide-y divide-gray-700/50">
                    <!-- Loaded via JS -->
                </tbody>
            </table>
        </div>
    </div>
</main>

<script src="js/admin_dashboard.js"></script>
</body>
</html>
