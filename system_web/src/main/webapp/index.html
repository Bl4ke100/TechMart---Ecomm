<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechMart Online | Enterprise E-Commerce</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen flex items-center justify-center p-4">

<main id="auth-view" class="w-full max-w-md">
    <div class="bg-gray-800 p-8 rounded-2xl shadow-2xl border border-gray-700">

        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-white mb-2">TechMart Online</h1>
            <p class="text-gray-400 text-sm">Employee Portal & Customer Login</p>
        </div>

        <form id="login-form" class="space-y-5">
            <div>
                <label for="username" class="block text-sm text-gray-400 mb-1">Username</label>
                <input type="text" id="username" required class="w-full p-3 bg-gray-700 rounded-lg border border-gray-600 focus:outline-none focus:border-gray-400 text-white transition">
            </div>
            <div>
                <label for="password" class="block text-sm text-gray-400 mb-1">Password</label>
                <input type="password" id="password" required class="w-full p-3 bg-gray-700 rounded-lg border border-gray-600 focus:outline-none focus:border-gray-400 text-white transition">
            </div>
            <div id="auth-error" class="text-red-400 text-sm text-center hidden"></div>
            <button type="submit" id="login-btn" class="w-full bg-white text-gray-900 hover:bg-gray-200 font-bold py-3 rounded-lg transition mt-4">
                Sign In
            </button>
            <p class="text-center text-sm text-gray-400 mt-6">
                Don't have an account? <a href="#" id="show-register" class="text-white hover:underline transition">Create one</a>
            </p>
        </form>

        <form id="register-form" class="space-y-5 hidden">
            <div>
                <label for="reg-username" class="block text-sm text-gray-400 mb-1">Username</label>
                <input type="text" id="reg-username" required class="w-full p-3 bg-gray-700 rounded-lg border border-gray-600 focus:outline-none focus:border-gray-400 text-white transition">
            </div>
            <div>
                <label for="reg-email" class="block text-sm text-gray-400 mb-1">Email</label>
                <input type="email" id="reg-email" required class="w-full p-3 bg-gray-700 rounded-lg border border-gray-600 focus:outline-none focus:border-gray-400 text-white transition">
            </div>
            <div>
                <label for="reg-password" class="block text-sm text-gray-400 mb-1">Password</label>
                <input type="password" id="reg-password" required class="w-full p-3 bg-gray-700 rounded-lg border border-gray-600 focus:outline-none focus:border-gray-400 text-white transition">
            </div>
            <div id="reg-error" class="text-red-400 text-sm text-center hidden"></div>
            <button type="submit" id="reg-btn" class="w-full bg-white text-gray-900 hover:bg-gray-200 font-bold py-3 rounded-lg transition mt-4">
                Register
            </button>
            <p class="text-center text-sm text-gray-400 mt-6">
                Already have an account? <a href="#" id="show-login" class="text-white hover:underline transition">Back to login</a>
            </p>
        </form>

    </div>
</main>

<script src="js/auth.js"></script>
</body>
</html>
