<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechMart Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="bg-gray-900 text-gray-100 min-h-screen">

    <nav class="flex items-center justify-between p-5 bg-gray-800 shadow-md">
        <div class="text-2xl font-bold text-white tracking-wide">TechMart</div>
        <div class="flex gap-6 items-center text-sm font-semibold">
            <a href="home.html" class="hover:text-gray-300 transition">Home</a>
            <a href="shop.html" class="hover:text-gray-300 transition">Shop</a>
            <a href="profile.html" class="bg-gray-700 px-4 py-2 rounded-lg text-white">My Profile</a>
            <button id="cart-btn" class="hover:text-gray-300 transition">Cart (<span id="cart-count">0</span>)</button>
            <button id="logout-btn" class="text-red-400 hover:text-red-300 transition">Logout</button>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto p-6 mt-8">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">

            <div class="bg-gray-800 p-8 rounded-2xl shadow-lg h-fit border border-gray-700">
                <h3 class="text-xl font-bold mb-6 text-white">My Details</h3>
                <form id="profile-form" class="space-y-5">
                    <div>
                        <label class="block text-sm text-gray-400 mb-1">Username</label>
                        <input type="text" id="prof-username" disabled
                            class="w-full p-3 bg-gray-700/50 rounded-lg border border-gray-600 opacity-60 cursor-not-allowed focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-sm text-gray-400 mb-1">Email Address</label>
                        <input type="email" id="prof-email" required
                            class="w-full p-3 bg-gray-700 rounded-lg border border-gray-600 focus:outline-none focus:border-gray-400 text-white">
                    </div>
                    <div>
                        <label class="block text-sm text-gray-400 mb-1">New Password</label>
                        <input type="password" id="prof-password"
                            class="w-full p-3 bg-gray-700 rounded-lg border border-gray-600 focus:outline-none focus:border-gray-400 text-white">
                        <small class="text-xs text-gray-500 mt-2 block">Leave blank to keep current.</small>
                    </div>
                    <button type="submit"
                        class="w-full bg-white text-gray-900 hover:bg-gray-200 font-bold py-3 rounded-lg transition mt-2">Update
                        Profile</button>
                    <div id="prof-msg" class="text-center text-sm mt-2 text-green-400"></div>
                </form>

                <hr class="border-gray-700 my-8">

                <h3 class="text-lg font-bold mb-4 text-red-500">Danger Zone</h3>
                <button
                    class="w-full bg-red-500/10 hover:bg-red-500/20 text-red-500 border border-red-500/50 font-bold py-3 rounded-lg transition"
                    onclick="deleteAccount()">Delete Account</button>
            </div>

            <div class="md:col-span-2 bg-gray-800 p-8 rounded-2xl shadow-lg h-fit border border-gray-700">
                <h3 class="text-xl font-bold mb-6 text-white">Order History</h3>
                <div class="overflow-x-auto">
                    <table class="w-full text-left text-sm whitespace-nowrap">
                        <thead class="text-gray-400 border-b border-gray-700">
                            <tr>
                                <th class="py-4 px-4 font-semibold">Order ID</th>
                                <th class="py-4 px-4 font-semibold">Product ID</th>
                                <th class="py-4 px-4 font-semibold">Quantity</th>
                                <th class="py-4 px-4 font-semibold">Date</th>
                                <th class="py-4 px-4 font-semibold">Status</th>
                            </tr>
                        </thead>
                        <tbody id="user-orders-table" class="divide-y divide-gray-700/50">
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </main>

    <div id="cart-modal"
        class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50 p-4">
        <div class="bg-gray-800 p-8 rounded-2xl shadow-2xl w-full max-w-md relative border border-gray-700">
            <button class="close-btn absolute top-4 right-5 text-gray-400 hover:text-white text-2xl">&times;</button>
            <h3 class="text-xl font-bold mb-6 text-white">Your Shopping Cart</h3>
            <div id="cart-items-list" class="space-y-4 max-h-64 overflow-y-auto mb-6 pr-2"></div>
            <div class="flex justify-between items-end border-t border-gray-700 pt-6 mb-8">
                <span class="text-gray-400 font-medium">Total:</span>
                <h2 id="cart-total-price" class="text-3xl font-bold text-white">$0.00</h2>
            </div>
            <button id="checkout-btn"
                class="w-full bg-white text-gray-900 hover:bg-gray-200 font-bold py-3 rounded-lg transition">Proceed to
                Checkout</button>
        </div>
    </div>

    <script src="js/shared.js"></script>
    <script src="js/profile.js"></script>
</body>

</html>
