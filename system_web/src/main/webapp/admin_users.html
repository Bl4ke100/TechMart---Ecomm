<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechMart Admin - Users</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen">

<nav class="flex items-center justify-between p-5 bg-gray-800 shadow-md">
    <div class="text-2xl font-bold text-white tracking-wide flex items-center gap-3">
        TechMart Admin
        <span class="bg-rose-500 text-white text-xs px-2.5 py-1 rounded font-semibold uppercase tracking-wider">Root Access</span>
    </div>
    <div class="flex gap-6 items-center text-sm font-semibold">
        <a href="admin_dashboard.html" class="hover:text-gray-300 transition">Platform</a>
        <a href="admin_performance.html" class="hover:text-gray-300 transition">Performance</a>
        <a href="admin_products.html" class="hover:text-gray-300 transition">Products</a>
        <a href="admin_users.html" class="bg-gray-700 px-4 py-2 rounded-lg text-white">Users</a>
        <button id="logout-btn" class="text-red-400 hover:text-red-300 transition">Logout</button>
    </div>
</nav>

<main class="max-w-6xl mx-auto p-6 mt-8">
    <section class="bg-gray-800 p-8 rounded-2xl shadow-lg border border-gray-700">
        <header class="mb-6">
            <h2 class="text-2xl font-bold text-white">User Management</h2>
        </header>

        <div class="overflow-x-auto">
            <table class="w-full text-left text-sm whitespace-nowrap">
                <thead class="text-gray-400 border-b border-gray-700">
                <tr>
                    <th class="py-4 px-4 font-semibold">ID</th>
                    <th class="py-4 px-4 font-semibold">Username</th>
                    <th class="py-4 px-4 font-semibold">Email</th>
                    <th class="py-4 px-4 font-semibold">Role</th>
                    <th class="py-4 px-4 font-semibold">Action</th>
                </tr>
                </thead>
                <tbody id="admin-users-table" class="divide-y divide-gray-700/50">
                </tbody>
            </table>
        </div>
    </section>
</main>

<script src="js/admin_users.js"></script>
</body>
</html>
