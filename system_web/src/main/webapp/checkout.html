<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechMart Checkout</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen">

<nav class="flex items-center justify-between p-5 bg-gray-800 shadow-md">
    <div class="text-2xl font-bold text-white tracking-wide">TechMart Checkout</div>
    <div class="flex gap-6 items-center text-sm font-semibold">
        <a href="shop.html" class="hover:text-gray-300 transition">Back to Shop</a>
    </div>
</nav>

<main class="max-w-4xl mx-auto p-6 mt-8">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">

        <div class="bg-gray-800 p-8 rounded-2xl shadow-lg h-fit border border-gray-700">
            <h3 class="text-xl font-bold mb-4 text-white">Order Summary</h3>
            <div id="checkout-items" class="space-y-4 border-b border-gray-700 pb-4 mb-4 max-h-64 overflow-y-auto pr-2">
            </div>
            <div class="flex justify-between items-center text-lg font-bold">
                <span class="text-gray-400">Total</span>
                <span id="checkout-total" class="text-2xl text-white">$0.00</span>
            </div>
        </div>

        <div class="bg-gray-800 p-8 rounded-2xl shadow-lg h-fit border border-gray-700">
            <h3 class="text-xl font-bold mb-6 text-white">Payment & Shipping</h3>
            <form id="checkout-form" class="space-y-5">
                <div>
                    <label for="chk-name" class="block text-sm text-gray-400 mb-1">Full Name</label>
                    <input type="text" id="chk-name" required class="w-full p-3 bg-gray-700 rounded-lg border border-gray-600 focus:outline-none focus:border-gray-400 text-white transition">
                </div>
                <div>
                    <label for="chk-address" class="block text-sm text-gray-400 mb-1">Shipping Address</label>
                    <input type="text" id="chk-address" required class="w-full p-3 bg-gray-700 rounded-lg border border-gray-600 focus:outline-none focus:border-gray-400 text-white transition">
                </div>
                <div>
                    <label for="chk-cc" class="block text-sm text-gray-400 mb-1">Credit Card Number</label>
                    <input type="text" id="chk-cc" required maxlength="16" class="w-full p-3 bg-gray-700 rounded-lg border border-gray-600 focus:outline-none focus:border-gray-400 text-white transition">
                </div>

                <button type="submit" id="place-order-btn" class="w-full bg-white text-gray-900 hover:bg-gray-200 font-bold py-3 rounded-lg transition mt-4">
                    Place Order
                </button>
                <div id="checkout-msg" class="text-center text-sm mt-2 text-green-400"></div>
            </form>
        </div>

    </div>
</main>

<div id="payment-modal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50 p-4">
    <div class="bg-gray-800 p-8 rounded-2xl shadow-2xl w-full max-w-sm text-center border border-gray-700">
        <h3 id="pay-title" class="text-lg font-semibold text-white mb-6">Connecting to Secure Payment Gateway...</h3>
        <div id="pay-spinner" class="animate-spin mx-auto w-12 h-12 border-4 border-gray-700 border-t-blue-500 rounded-full my-6"></div>
        <p id="pay-status" class="text-sm text-gray-400">Initializing secure connection...</p>
    </div>
</div>

<script src="js/shared.js"></script>
<script src="js/checkout.js"></script>
</body>
</html>
