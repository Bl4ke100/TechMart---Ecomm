<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechMart Shop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>

<body class="bg-gray-900 text-gray-100 min-h-screen">
    
    <nav class="flex items-center justify-between p-5 bg-gray-800 shadow-md">
        <div class="text-2xl font-bold text-white tracking-wide">TechMart</div>
        <div class="flex gap-6 items-center text-sm font-semibold">
            <span id="user-greeting" class="text-gray-400 mr-4">Welcome</span>
            <a href="home.html" class="hover:text-gray-300 transition">Home</a>
            <a href="shop.html" class="bg-gray-700 px-4 py-2 rounded-lg text-white">Shop</a>
            <button id="nav-profile-btn" class="hover:text-gray-300 transition">My Profile</button>
            <button id="cart-btn" class="hover:text-gray-300 transition">Cart (<span id="cart-count">0</span>)</button>
            <button id="logout-btn" class="text-red-400 hover:text-red-300 transition">Logout</button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-6 mt-8">
        <div class="mb-8 flex flex-col md:flex-row justify-between items-start md:items-end gap-4">
            <div>
                <h2 class="text-3xl font-bold text-white mb-2">Product Catalog</h2>
                <p class="text-gray-400">Discover our latest premium tech gear.</p>
            </div>
            <div class="flex gap-4 w-full md:w-auto">
                <div class="relative w-full md:w-64">
                    <input type="text" id="search-input" placeholder="Search products..." class="w-full p-2.5 pl-4 bg-gray-800 rounded-lg border border-gray-700 focus:outline-none focus:border-gray-500 text-white text-sm transition">
                </div>
                <select id="sort-select" class="p-2.5 bg-gray-800 rounded-lg border border-gray-700 focus:outline-none focus:border-gray-500 text-white text-sm transition">
                    <option value="default">Sort by</option>
                    <option value="price-asc">Price: Low to High</option>
                    <option value="price-desc">Price: High to Low</option>
                    <option value="name-asc">Name: A to Z</option>
                </select>
            </div>
        </div>
        
        <div id="products-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">

        </div>
    </main>


    <div id="profile-modal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50 p-4">
        <div class="bg-gray-800 p-8 rounded-2xl shadow-2xl w-full max-w-4xl relative border border-gray-700">
            <button class="close-btn absolute top-4 right-5 text-gray-400 hover:text-white text-2xl">&times;</button>
            <h3 class="text-xl font-bold mb-6 text-white">My Order History</h3>
            <div class="overflow-x-auto">
                <table class="w-full text-left text-sm whitespace-nowrap">
                    <thead class="text-gray-400 border-b border-gray-700">
                        <tr>
                            <th class="py-4 px-4 font-semibold">Order ID</th>
                            <th class="py-4 px-4 font-semibold">Product ID</th>
                            <th class="py-4 px-4 font-semibold">Quantity</th>
                            <th class="py-4 px-4 font-semibold">Date</th>
                            <th class="py-4 px-4 font-semibold">Status</th>
                        </tr>
                    </thead>
                    <tbody id="user-orders-table" class="divide-y divide-gray-700/50"></tbody>
                </table>
            </div>
        </div>
    </div>


    <div id="cart-modal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50 p-4">
        <div class="bg-gray-800 p-8 rounded-2xl shadow-2xl w-full max-w-md relative border border-gray-700">
            <button class="close-btn absolute top-4 right-5 text-gray-400 hover:text-white text-2xl">&times;</button>
            <h3 class="text-xl font-bold mb-6 text-white">Your Shopping Cart</h3>
            <div id="cart-items-list" class="space-y-4 max-h-64 overflow-y-auto mb-6 pr-2"></div>
            <div class="flex justify-between items-end border-t border-gray-700 pt-6 mb-8">
                <span class="text-gray-400 font-medium">Total:</span>
                <h2 id="cart-total-price" class="text-3xl font-bold text-white">$0.00</h2>
            </div>
            <button id="checkout-btn" class="w-full bg-white text-gray-900 hover:bg-gray-200 font-bold py-3 rounded-lg transition">Proceed to Checkout</button>
        </div>
    </div>

    <script src="js/shared.js"></script>
    <script src="js/shop.js"></script>
</body>

</html>
